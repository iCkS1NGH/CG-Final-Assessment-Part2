<nav class="navbar">
  <span class="brand"> Event Portal</span>
  <button class="btn-logout" (click)="logout()">Logout</button>
</nav>

<div class="main-container">
  <div class="welcome">
    <h1>Dashboard</h1>
    <p>Manage your event registrations from here.</p>
  </div>

  <div class="stats-cards">
    <div class="card">
      <p class="card-label">Total Registrations</p>
      <p class="card-value">{{ totalParticipants }}</p>
    </div>
  </div>

  <button class="btn-primary" (click)="goToRegistration()">
    + Register Participant
  </button>
</div>
